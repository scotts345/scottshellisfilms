<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact | Wedding Videographer UK | Scott Shellis Films</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="Get in touch with Scott Shellis Films, a Worcestershire and UK wedding videographer creating natural and cinematic wedding films.">

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #ffffff;
  color: #000;
  font-weight: 300;
  letter-spacing: 0.3px;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 22px 0;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(6px);
  z-index: 100;
}

.nav-inner {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo,
.nav-links a {
  font-family: 'EB Garamond', serif;
  letter-spacing: 0.18em;
}

.logo {
  font-size: 14px;
  color: #333;
  text-decoration: none;
}

.nav-links a {
  margin-left: 26px;
  text-decoration: none;
  font-size: 12px;
  color: #333;
  position: relative;
}

.nav-links a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 1px;
  background: currentColor;
  transition: width 0.3s ease;
}

.nav-links a:hover::after {
  width: 100%;
}

.nav-links a[href="contact.html"] {
  color: #999;
}

/* TITLE */
.title {
  margin-top: 140px;
  text-align: center;
}

.title h1 {
  font-family: 'EB Garamond', serif;
  font-size: clamp(28px, 5vw, 52px);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 400;
  color: #2b2b2b;
  margin-bottom: 14px;
}

.subtitle {
  text-align: center;
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  margin-top: 10px;
  margin-bottom: 60px;
}

/* FORM (UNCHANGED) */
.form-container {
  max-width: 480px;
  margin: auto;
  padding: 50px 20px;
}

input, textarea {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ddd;
  padding: 12px 5px;
  margin-top: 28px;
  font-size: 13px;
  font-family: inherit;
  background: transparent;
}

textarea {
  height: 110px;
}

button {
  margin-top: 40px;
  display: block;
  margin-left: auto;
  margin-right: auto;
  padding: 10px 20px;
  border: none;
  background: transparent;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  color: #888;
}

.success-message {
  text-align: center;
  margin-top: 25px;
  display: none;
}

/* MOBILE NAV FIX */
@media (max-width: 768px) {

  .nav-inner {
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .nav-links {
    display: flex;
    justify-content: center;
    gap: 18px;
  }

  .nav-links a {
    margin-left: 0;
    font-size: 11px;
  }

}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">SCOTT SHELLIS FILMS</a>
    <div class="nav-links">
      <a href="index.html">HOME</a>
      <a href="films.html">FILMS</a>
      <a href="contact.html">CONTACT</a>
    </div>
  </div>
</div>

<div class="title">
  <h1>CONTACT</h1>
</div>

<div class="subtitle">
  I’d love to hear about your plans
</div>

<div class="form-container">
<form id="form">
<input type="hidden" name="access_key" value="6baf5fb5-3a3c-4ec0-8b78-7d2e65be2cfe">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message" required></textarea>
<button type="submit">Send</button>
</form>

<div class="success-message" id="success">
Message sent successfully
</div>
</div>

<script>
const form = document.getElementById("form");
const success = document.getElementById("success");

form.addEventListener("submit", function(e) {
  e.preventDefault();
  const data = new FormData(form);

  fetch("https://api.web3forms.com/submit", {
    method: "POST",
    body: data
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      form.reset();
      success.style.display = "block";
    }
  });
});
</script>

</body>
</html>
