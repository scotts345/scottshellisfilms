<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Films</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Avenir", "Avenir Next", sans-serif;
  background: #ffffff;
  color: #666;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 28px;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 22px 0;
  z-index: 100;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(6px);
}

.nav-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo,
.nav-links a {
  font-family: 'EB Garamond', serif;
  letter-spacing: 0.18em;
}

.logo {
  font-size: 14px;
  color: #333;
  text-decoration: none;
}

.nav-links a {
  margin-left: 26px;
  text-decoration: none;
  font-size: 12px;
  color: #333;
  position: relative;
}

.nav-links a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 1px;
  background: currentColor;
  transition: width 0.3s ease;
}

.nav-links a:hover::after {
  width: 100%;
}

.nav-links a[href="films.html"] {
  color: #999;
}

/* TITLE */
.title {
  margin-top: 140px;
  text-align: center;
}

.title h1 {
  font-family: 'EB Garamond', serif;
  font-size: clamp(28px, 5vw, 52px);
  letter-spacing: 0.20em;
  text-transform: uppercase;
  font-weight: 400;
  color: #2b2b2b;
  margin-bottom: 14px;
}

.subtitle {
  text-align: center;
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  margin-top: 10px;
  margin-bottom: 80px;
}

/* GRID */
.film-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 50px;
}

.film-item.large {
  grid-column: span 2;
}

.video-wrapper {
  position: relative;
  width: 100%;
  overflow: hidden;
  cursor: pointer;
  background: #000;
}

.video-16x9 { aspect-ratio: 16/9; }
.video-wide { aspect-ratio: 2.35/1; }

.video-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

.video-wrapper:hover img {
  transform: scale(1.04);
  opacity: 0.9;
}

.play-button {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 70px;
  height: 70px;
  transform: translate(-50%, -50%);
  border: 1px solid white;
}

.play-button::after {
  content: "";
  position: absolute;
  left: 26px;
  top: 20px;
  border-left: 18px solid white;
  border-top: 12px solid transparent;
  border-bottom: 12px solid transparent;
}

.video-wrapper iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

.film-info {
  margin-top: 16px;
}

.film-info h3 {
  font-size: 14px;
  letter-spacing: 0.12em;
  color: #333;
}

.film-info p {
  font-size: 14px;
  color: #888;
}

.bottom-space { height: 120px; }

/* MOBILE NAV FIX (SAFE) */
@media (max-width: 768px) {

  .nav-inner {
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .nav-links {
    display: flex;
    justify-content: center;
    gap: 18px;
  }

  .nav-links a {
    margin-left: 0;
    font-size: 11px;
  }

  .film-grid { grid-template-columns: 1fr; }
  .film-item.large { grid-column: span 1; }
}
</style>
</head>

<body>

<div class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo">SCOTT SHELLIS FILMS</a>
    <div class="nav-links">
      <a href="index.html">HOME</a>
      <a href="films.html">FILMS</a>
      <a href="contact.html">CONTACT</a>
    </div>
  </div>
</div>

<div class="container">

  <div class="title">
    <h1>WEDDING FILMS</h1>
  </div>

  <div class="subtitle">Selected Work</div>

  <div class="film-grid">

    <div class="film-item large">
      <div class="video-wrapper video-16x9" onclick="loadVideo(this, '1zedcUAOg6yp901wx7gOe4BolpRRMZr4L')">
        <img src="molly_thumb.webp">
        <div class="play-button"></div>
      </div>
      <div class="film-info">
        <h3>Molly & Ryan</h3>
        <p>Curradine Barns</p>
      </div>
    </div>

    <div class="film-item">
      <div class="video-wrapper video-wide" onclick="loadVideo(this, '1gebW2Mhwl1mFADk8ogpRTaaAiSFw4YY4')">
        <img src="olivia_thumb.webp">
        <div class="play-button"></div>
      </div>
      <div class="film-info">
        <h3>Olivia & Will</h3>
        <p>Whitbourne Hall</p>
      </div>
    </div>

    <div class="film-item">
      <div class="video-wrapper video-16x9" onclick="loadVideo(this, '1UD-d3rUv1sdNp_8igV9vZ2Rv7VDWUPbK')">
        <img src="chelsea_thumb.webp">
        <div class="play-button"></div>
      </div>
      <div class="film-info">
        <h3>Chelsea & Scott</h3>
        <p>Curradine Barns</p>
      </div>
    </div>

  </div>

  <div class="bottom-space"></div>

</div>

<script>
function loadVideo(el, id) {
  el.innerHTML = `
    <iframe src="https://drive.google.com/file/d/${id}/preview?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
  `;
}
</script>

</body>
</html>
